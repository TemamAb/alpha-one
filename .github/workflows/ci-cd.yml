# AlphaMark CI/CD Pipeline
# Deploys to fly.io in LIVE TRADING MODE by default

name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Python tests
      run: |
        python -m pytest simulation_backtesting/test_cases/ -v
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Node.js dependencies
      working-directory: ./monitoring_dashboard
      run: npm ci
        
    - name: Build Docker images
      run: |
        docker-compose build
        
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Run Python linters
      run: |
        pip install flake8 black
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .
        
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security audit
      run: |
        pip install safety
        safety check
        
    - name: Check for secrets
      run: |
        pip install git-hooks
        # Add your secret scanning here

  deploy:
    needs: [test, lint, security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Fly.io
      uses: superfly/flyctl-actions@setup-flyctl@v1
      
    - name: Deploy Bot to Fly.io
      run: |
        flyctl deploy --app alpha --dockerfile Dockerfile.bot
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # Secrets are passed via GitHub secrets
        # Required secrets:
        # - FLY_API_TOKEN
        # - PRIVATE_KEY (wallet private key)
        # - PIMLICO_API_KEY
        # - WALLET_ADDRESS
        # - ETH_RPC_URL
        # - etc.

  deploy-dashboard:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Fly.io
      uses: superfly/flyctl-actions@setup-flyctl@v1
      
    - name: Deploy Dashboard to Fly.io
      run: |
        flyctl deploy --app alpha-dashboard --dockerfile monitoring_dashboard/Dockerfile
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
