app = "alphamark-arbitrage"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  context = "."

[env]
  # CRITICAL: Set to "false" for Live Trading on Deployment
  PAPER_TRADING_MODE = "false"
  NODE_ENV = "production"
  MAX_SLIPPAGE = "0.005"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "120s"
  interval = "15s"
  method = "get"
  path = "/api/health"
  protocol = "http"
  timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024